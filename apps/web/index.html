<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- SEO — default meta tags (overridden per-route by SeoHead) -->
    <title>The Sovereign Artisor — Luxury Salon in Marrakech</title>
    <meta name="description" content="A curated salon experience in the heart of Marrakech. Hair, color, bridal, and spa services crafted by skilled artisans." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="The Sovereign Artisor — Luxury Salon in Marrakech" />
    <meta property="og:description" content="A curated salon experience in the heart of Marrakech." />
    <meta property="og:image" content="/og-default.jpg" />
    <meta property="og:type" content="website" />

    <!-- Fonts — Google Fonts with font-display: swap for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- Critical CSS — prevents FOUC -->
    <style>
      /* Prevent flash of unstyled content while fonts and CSS load */
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
